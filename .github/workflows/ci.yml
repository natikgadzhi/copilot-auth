name: CI

# Lint, test, and build on every push and PR. Runs on macOS because the code
# uses AppKit/Security/WKWebView and is built as an .app bundle via Xcode.
on:
  push:
  pull_request:

# A newer push to the same ref cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Lint, test, build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # xcodegen drives the project; swift-format enforces style. Both come from
      # Homebrew (preinstalled on the runner). swift-format is unpinned, so a
      # brew version that differs from a contributor's local one could disagree
      # on `lint --strict`; pin a tag here if that ever bites.
      - name: Install xcodegen and swift-format
        run: brew install xcodegen swift-format

      - name: Lint formatting
        run: make lint-format

      - name: Run package tests
        run: make test

      # No Developer ID certs on the runner, so build unsigned. This only proves
      # the App/ target compiles and links; the logic is covered by `make test`.
      - name: Build the app (unsigned)
        run: make build XCODEBUILD_FLAGS="CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO"
