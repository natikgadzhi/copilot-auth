name: Release

# Tag-triggered build → sign → notarize → DMG, with verifiable provenance:
# a SLSA build-provenance attestation, a published SHA-256, and the commit SHA
# baked into the app (shown in About). Build/sign/notarize happen ONLY here —
# no laptop is ever in the published trust path.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create the Release + upload assets
  id-token: write # OIDC token for the SLSA attestation signer
  attestations: write # store the attestation

jobs:
  release:
    name: Build, notarize, attest, release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build signed + notarized DMG
        env:
          # Apple signing + notarization (same contract as the sibling apps).
          APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          APPLE_NOTARY_API_KEY_BASE64: ${{ secrets.APPLE_NOTARY_API_KEY_BASE64 }}
          APPLE_NOTARY_API_KEY_ID: ${{ secrets.APPLE_NOTARY_API_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          # Crash-reporting DSN, baked in only for official releases.
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          # GITHUB_SHA (the tagged commit) is already in the env → embedded in the
          # build. "build N" auto-increments per release run.
          CURRENT_PROJECT_VERSION: ${{ github.run_number }}
        run: scripts/build-dmg.sh

      - name: Resolve artifact path
        id: artifact
        shell: bash
        run: |
          dmg_path="$(find build/release -maxdepth 1 -name '*.dmg' -print | head -n 1)"
          if [[ -z "${dmg_path}" ]]; then
            echo "No DMG found in build/release" >&2
            exit 1
          fi
          echo "dmg_path=${dmg_path}" >> "$GITHUB_OUTPUT"

      - name: Compute SHA-256
        id: checksum
        shell: bash
        run: |
          dmg_path="${{ steps.artifact.outputs.dmg_path }}"
          # Write the checksum with just the basename (not the build/release/…
          # path) so `shasum -a 256 -c CopilotAuth-*.dmg.sha256` verifies the
          # downloaded file directly.
          ( cd "$(dirname "${dmg_path}")" && shasum -a 256 "$(basename "${dmg_path}")" ) \
            | tee "${dmg_path}.sha256"
          echo "sha256=$(shasum -a 256 "${dmg_path}" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ steps.artifact.outputs.dmg_path }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ steps.artifact.outputs.dmg_path }}
            ${{ steps.artifact.outputs.dmg_path }}.sha256
          body: |
            ### Verifying this build

            **SHA-256:** `${{ steps.checksum.outputs.sha256 }}`

            ```sh
            shasum -a 256 CopilotAuth*.dmg                  # matches the hash above
            gh attestation verify CopilotAuth*.dmg --repo natikgadzhi/copilot-auth
            ```

            The running app's About panel shows the commit it was built from. See
            [SECURITY.md](https://github.com/natikgadzhi/copilot-auth/blob/main/SECURITY.md).

      - name: Check out the Homebrew tap
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/checkout@v5
        with:
          repository: natikgadzhi/homebrew-taps
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: tap

      - name: Regenerate and push the cask
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SHA256: ${{ steps.checksum.outputs.sha256 }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          cat > tap/Casks/copilot-auth.rb <<EOF
          # This file is updated by the copilot-auth release workflow. DO NOT EDIT.
          cask "copilot-auth" do
            version "${version}"
            sha256 "${SHA256}"

            url "https://github.com/natikgadzhi/copilot-auth/releases/download/v#{version}/CopilotAuth-#{version}.dmg",
                verified: "github.com/natikgadzhi/copilot-auth/"
            name "Copilot Auth"
            desc "Captures Copilot Money session secrets into the macOS Keychain"
            homepage "https://github.com/natikgadzhi/copilot-auth"

            depends_on macos: ">= :sonoma"

            app "Copilot Auth.app"
            # Mirror \`make install\`: put the in-bundle binary on PATH as \`copilot-auth\`
            # so \`copilot-auth authenticate\` / \`copilot-auth check\` work from any shell.
            binary "#{appdir}/Copilot Auth.app/Contents/MacOS/Copilot Auth", target: "copilot-auth"

            zap trash: [
              "~/Library/Caches/io.respawn.CopilotAuth",
              "~/Library/Preferences/io.respawn.CopilotAuth.plist",
              "~/Library/Saved Application State/io.respawn.CopilotAuth.savedState",
            ]
          end
          EOF
          cd tap
          if git diff --quiet -- Casks/copilot-auth.rb; then
            echo "Cask already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/copilot-auth.rb
          git commit -m "Brew cask update for copilot-auth version v${version}"
          git push origin HEAD:main
